<!DOCTYPE html>
<html lang="en">

<head>

<body>

<header>

<img src="logo.png" alt="Greek Lovers Logo" class="logo">

</header>

<section class="order">

<form id="paymentForm">

<h2>Choose a Payment Method</h2>

<br>

<label>

<input

name="payment"

<br><br>

<label>

<input
type="radio"
name="payment"
value="Cash Payment"
required>

</label>

<br><br><br>

<button type="submit">

Review Order

</button>

</form>

</section>

</p>
